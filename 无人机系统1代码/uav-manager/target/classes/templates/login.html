<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>无人机管理系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .login-panel { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-panel">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title text-center">无人机信息管理系统</h3>
            </div>
            <div class="panel-body">
                <form method="post" action="/login">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" class="form-control" name="username" placeholder="admin" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" class="form-control" name="password" placeholder="admin123" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                    <p class="text-danger text-center" style="margin-top: 10px;" th:if="${param.error}">
                        用户名或密码错误
                    </p>
                    <p class="text-muted text-center" style="margin-top: 15px;">
                        测试账号：admin / admin123
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
